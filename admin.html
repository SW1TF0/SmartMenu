<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --bg: #050505;
            --card: #121212;
            --accent: #d4af37; 
            --free: #00ff88;
            --occupied: #ff4d4d;
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            min-height: 100vh;
        }

        /* Login Overlay */
        #loginOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .pin-container {
            background: var(--card);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            text-align: center;
            width: 100%;
            max-width: 320px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .pin-dots {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .dot {
            width: 14px; height: 14px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--accent);
            transition: 0.2s;
        }

        .dot.active { background: var(--accent); box-shadow: 0 0 10px var(--accent); }

        .pin-pad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .pin-btn {
            aspect-ratio: 1/1;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.05);
            background: var(--glass);
            color: white;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s;
        }

        .pin-btn:active { background: var(--accent); color: black; transform: scale(0.9); }

        /* Dashboard Main */
        #mainContent { display: none; padding: 15px; padding-bottom: 40px; }

        h1 { 
            text-align: center; 
            color: var(--accent); 
            font-weight: 200; 
            letter-spacing: 4px; 
            margin: 20px 0 30px 0;
            font-size: 1.8rem;
            text-transform: uppercase;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 колони на мобилен */
            gap: 12px;
            max-width: 1000px;
            margin: 0 auto;
        }

        @media (min-width: 600px) {
            .dashboard { grid-template-columns: repeat(4, 1fr); gap: 20px; }
            h1 { font-size: 2.5rem; }
        }

        @media (min-width: 900px) {
            .dashboard { grid-template-columns: repeat(6, 1fr); }
        }

        .table-card {
            background: var(--card);
            border-radius: 16px;
            padding: 15px 5px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: all 0.2s;
        }

        .table-card:active { transform: scale(0.95); opacity: 0.8; }

        .table-status-icon { font-size: 24px; margin-bottom: 8px; display: block; }
        .table-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; color: #888; }
        .status-badge { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; }

        .free .table-status-icon { color: var(--free); opacity: 0.3; }
        .free .status-badge { color: var(--free); }

        .occupied { border-color: rgba(255, 77, 77, 0.4); background: rgba(255, 77, 77, 0.05); }
        .occupied .table-status-icon { color: var(--occupied); }
        .occupied .table-name { color: white; }
        .occupied .status-badge { color: var(--occupied); font-weight: bold; }

        /* Modal Design */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
            z-index: 1000;
            justify-content: center;
            align-items: flex-end; /* Излиза отдолу на телефон */
        }

        @media (min-width: 600px) { .modal { align-items: center; } }

        .modal.active { display: flex; }

        .modal-content {
            background: #161616;
            width: 100%;
            max-width: 500px;
            border-radius: 30px 30px 0 0;
            padding: 30px 20px;
            position: relative;
            border-top: 1px solid var(--accent);
            animation: slideUp 0.3s ease-out;
        }

        @media (min-width: 600px) {
            .modal-content { border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); }
        }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        #confirmOverlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #161616;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 20px;
            text-align: center;
            border-radius: inherit;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .total-section {
            margin-top: 20px;
            padding: 20px 0;
            border-top: 1px dashed rgba(212, 175, 55, 0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-reset {
            background: var(--accent);
            color: black;
            border: none;
            padding: 20px;
            width: 100%;
            border-radius: 16px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
        }

        .btn-confirm { background: var(--occupied); color: white; margin-bottom: 12px; }
        .btn-cancel { background: rgba(255,255,255,0.05); color: white; }

        #notification {
            position: fixed;
            top: 20px; left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--accent);
            color: black;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 600;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10000;
            white-space: nowrap;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        #notification.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <!-- PIN LOGIN -->
    <div id="loginOverlay">
        <div class="pin-container">
            <h2 style="color: var(--accent); font-weight: 300; margin-bottom: 5px;">DASHBOARD</h2>
            <p style="font-size: 12px; color: #555; margin-bottom: 25px;">Въведете ПИН код</p>
            <div class="pin-dots" id="pinDots">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <div class="pin-pad">
                <button class="pin-btn" onclick="pressPin(1)">1</button>
                <button class="pin-btn" onclick="pressPin(2)">2</button>
                <button class="pin-btn" onclick="pressPin(3)">3</button>
                <button class="pin-btn" onclick="pressPin(4)">4</button>
                <button class="pin-btn" onclick="pressPin(5)">5</button>
                <button class="pin-btn" onclick="pressPin(6)">6</button>
                <button class="pin-btn" onclick="pressPin(7)">7</button>
                <button class="pin-btn" onclick="pressPin(8)">8</button>
                <button class="pin-btn" onclick="pressPin(9)">9</button>
                <button class="pin-btn" onclick="pressPin('C')"><small>CLR</small></button>
                <button class="pin-btn" onclick="pressPin(0)">0</button>
                <button class="pin-btn" onclick="pressPin('D')"><i class="fas fa-backspace"></i></button>
            </div>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div id="mainContent">
        <h1>Dashboard</h1>
        <div class="dashboard" id="tableGrid"></div>
    </div>

    <!-- ORDER MODAL -->
    <div id="orderModal" class="modal">
        <div class="modal-content">
            <div id="confirmOverlay">
                <div style="background: rgba(231, 76, 60, 0.1); width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 20px;">
                    <i class="fas fa-trash-alt" style="font-size: 30px; color: var(--occupied);"></i>
                </div>
                <h2 style="margin: 0 0 10px 0;">Освобождаване?</h2>
                <p style="color: #888; margin-bottom: 30px; font-size: 14px;">Това ще изтрие текущата поръчка завинаги.</p>
                <button class="btn-reset btn-confirm" onclick="resetTable()">ПОТВЪРДИ</button>
                <button class="btn-reset btn-cancel" onclick="toggleConfirm(false)">ОТКАЗ</button>
            </div>

            <div onclick="closeModal()" style="height: 5px; width: 40px; background: #333; border-radius: 10px; margin: -10px auto 20px auto; cursor: pointer;"></div>
            
            <h2 id="modalTitle" style="margin-top: 0; font-weight: 300; font-size: 1.2rem;">Table</h2>
            <div id="orderList" style="max-height: 50vh; overflow-y: auto; margin-top: 15px;"></div>
            
            <div class="total-section">
                <span style="color: #666; font-weight: bold;">ОБЩО</span>
                <span id="modalTotal" style="font-size: 24px; color: var(--accent); font-weight: 800;">0.00 €</span>
            </div>
            
            <button class="btn-reset" onclick="toggleConfirm(true)">
                <i class="fas fa-check-circle"></i> ПРИКЛЮЧИ СМЕТКА
            </button>
        </div>
    </div>

    <div id="notification"></div>

    <script>
        let currentPin = "";
        const CORRECT_PIN = "1337";

        function pressPin(val) {
            if (val === 'C') currentPin = "";
            else if (val === 'D') currentPin = currentPin.slice(0, -1);
            else if (currentPin.length < 4) currentPin += val;
            updateDots();
            if (currentPin.length === 4) {
                setTimeout(() => {
                    if (currentPin === CORRECT_PIN) {
                        document.getElementById('loginOverlay').style.display = 'none';
                        document.getElementById('mainContent').style.display = 'block';
                    } else {
                        showNotify("Грешен код!");
                        currentPin = "";
                        updateDots();
                    }
                }, 150);
            }
        }

        function updateDots() {
            const dots = document.querySelectorAll('.dot');
            dots.forEach((dot, index) => {
                dot.classList.toggle('active', index < currentPin.length);
            });
        }

        const firebaseConfig = {
            apiKey: "AIzaSyAdfNQ-Y72qkqPSgBqZYFm-d1PmM0Wpd_M",
            authDomain: "smartmenukj.firebaseapp.com",
            databaseURL: "https://smartmenukj-default-rtdb.firebaseio.com",
            projectId: "smartmenukj",
            storageBucket: "smartmenukj.firebasestorage.app",
            messagingSenderId: "465512343655",
            appId: "1:465512343655:web:7c187c5c0b0e0cdbda4cc2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentActiveTable = null;

        // Рендериране на 24 маси за по-добра симетрия
        const grid = document.getElementById('tableGrid');
        for (let i = 1; i <= 24; i++) {
            grid.innerHTML += `
                <div id="table-${i}" class="table-card free" onclick="viewTable(${i})">
                    <i class="fas fa-couch table-status-icon"></i>
                    <div class="table-name">МАСА ${i}</div>
                    <span class="status-badge">Свободна</span>
                </div>
            `;
        }

        db.ref('tables').on('value', (snapshot) => {
            const data = snapshot.val() || {};
            for (let i = 1; i <= 24; i++) {
                const card = document.getElementById(`table-${i}`);
                if (!card) continue;
                const badge = card.querySelector('.status-badge');
                if (data[i] && data[i].status === 'occupied') {
                    card.className = 'table-card occupied';
                    badge.innerText = 'Заета';
                } else {
                    card.className = 'table-card free';
                    badge.innerText = 'Свободна';
                }
            }
            if (currentActiveTable) viewTable(currentActiveTable, true);
        });

        function viewTable(tableNum, isUpdate = false) {
            currentActiveTable = tableNum;
            db.ref('tables/' + tableNum).once('value').then((snapshot) => {
                const data = snapshot.val();
                if (!isUpdate && (!data || data.status === 'free')) {
                    showNotify(`Маса ${tableNum} е свободна`);
                    return;
                }
                document.getElementById('modalTitle').innerHTML = `МАСА ${tableNum}`;
                const list = document.getElementById('orderList');
                list.innerHTML = "";
                let total = 0;
                if (data && data.orders) {
                    Object.values(data.orders).forEach(order => {
                        order.items.forEach(item => {
                            total += (item.price * item.qty);
                            list.innerHTML += `
                                <div class="order-item">
                                    <div>
                                        <div style="font-weight: 600; font-size: 15px;">${item.nameBg}</div>
                                        <div style="font-size: 12px; color: #666;">${item.qty} x ${item.price.toFixed(2)}</div>
                                    </div>
                                    <div style="font-weight: bold; color: #eee;">${(item.price * item.qty).toFixed(2)} €</div>
                                </div>`;
                        });
                    });
                } else if(isUpdate) { closeModal(); return; }
                document.getElementById('modalTotal').innerText = total.toFixed(2) + " €";
                if(!isUpdate) {
                    const modal = document.getElementById('orderModal');
                    modal.classList.add('active');
                }
            });
        }

        function toggleConfirm(show) { document.getElementById('confirmOverlay').style.display = show ? "flex" : "none"; }
        function closeModal() {
            document.getElementById('orderModal').classList.remove('active');
            toggleConfirm(false);
            currentActiveTable = null;
        }

        function resetTable() {
            db.ref('tables/' + currentActiveTable).remove().then(() => {
                showNotify(`Маса ${currentActiveTable} е освободена!`);
                closeModal();
            });
        }

        function showNotify(msg) {
            const note = document.getElementById('notification');
            note.innerText = msg;
            note.classList.add('show');
            setTimeout(() => note.classList.remove('show'), 2500);
        }
    </script>
</body>
</html>
